<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#171717"/>
  <!-- antennas -->
  <path stroke="url(#m)" stroke-width="2" stroke-linecap="round" d="M11 7V4M21 7V4"/>
  <circle cx="11" cy="3" r="1.5" fill="url(#m)"/>
  <circle cx="21" cy="3" r="1.5" fill="url(#m)"/>
  <!-- head -->
  <rect x="7" y="8" width="18" height="16" rx="4" fill="url(#m)" opacity=".95"/>
  <!-- face plate -->
  <rect x="9.5" y="10.5" width="13" height="11" rx="2" fill="#171717"/>
  <!-- eyes / visor -->
  <rect x="11" y="13" width="4" height="3" rx="1" fill="#6366f1"/>
  <rect x="17" y="13" width="4" height="3" rx="1" fill="#8b5cf6"/>
  <!-- mouth grille -->
  <path stroke="#4b5563" stroke-width="1.2" stroke-linecap="round" d="M12 19h8"/>
  <path stroke="#4b5563" stroke-width="1.2" stroke-linecap="round" d="M13 21h6"/>
  <defs>
    <linearGradient id="m" x1="7" y1="4" x2="25" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a5b4fc"/>
      <stop offset=".5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
</svg>
